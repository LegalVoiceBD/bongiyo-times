name: Auto News Scraper
on:
  schedule:
    - cron: '0,30 * * * *' # প্রতি ঘণ্টার ০০ এবং ৩০ মিনিটে চলবে
  workflow_dispatch:
  repository_dispatch:     
    types: [run-scraper]   
jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Packages
        # এখানে এআই-এর প্যাকেজগুলো যুক্ত করা হয়েছে
        run: npm install cheerio @supabase/supabase-js @google/generative-ai dotenv
        
      - name: Run Scraper Bot
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # জেমিনির এপিআই কি যুক্ত হলো
        run: node scripts/scraper.js
